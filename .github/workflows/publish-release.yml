name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.1)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22.x"
          cache: npm

      - run: npm ci

      - name: Bump version in package.json
        run: npm pkg set version="${{ github.event.inputs.version }}"

      - run: npm run build:prod

      - name: Create release branch, tag, and open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/v${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package.json dist/card.js
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"
          git push origin "$BRANCH"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"
          gh pr create \
            --title "chore: bump version to ${{ github.event.inputs.version }}" \
            --body "Automated version bump for release v${{ github.event.inputs.version }}." \
            --base main \
            --head "$BRANCH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          files: dist/card.js
          generate_release_notes: true
