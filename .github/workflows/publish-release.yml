name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag is strictly greater than previous release
        run: |
          CURR="${GITHUB_REF_NAME#v}"
          PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous release tag found — first release, proceeding."
            exit 0
          fi
          PREV="${PREV#v}"
          if [ "$PREV" = "$CURR" ]; then
            echo "Error: v$CURR already exists as a release tag."
            exit 1
          fi
          LOWER=$(printf '%s\n%s\n' "$PREV" "$CURR" | sort -V | head -1)
          if [ "$LOWER" != "$PREV" ]; then
            echo "Error: v$CURR is not greater than previous release v$PREV"
            exit 1
          fi
          echo "Tag v$CURR is valid (previous release: v$PREV)"

      - uses: actions/setup-node@v5
        with:
          node-version: "22.x"
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build production bundle
        run: npm run build:prod
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/card.js
          generate_release_notes: true
